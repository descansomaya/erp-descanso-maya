<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Descanso Maya ERP</title>

<style>
body{font-family:Arial;margin:0;padding:0}
.hidden{display:none}
</style>

</head>

<body>

<h2>Descanso Maya</h2>

<button onclick="abrirConfig()">Configuración</button>

<div id="config" class="hidden">
  <h3>Configuración</h3>

  <label>Firma automática (imagen)</label><br>
  <input type="file" id="firmaFile"><br><br>

  <div id="firmaPreview" style="display:none;">
    <img id="firmaImg" style="max-height:80px;">
  </div>

  <br>
  <button onclick="guardarFirma()">Guardar firma</button>

  <hr>

  <h4>Logs</h4>
  <button onclick="copiarLogs()">📋 Copiar</button>
  <button onclick="descargarLogs()">⬇️ Descargar</button>
  <button onclick="limpiarLogs()">🧹 Limpiar</button>

  <div id="logs"></div>

</div>

<script>
const CONFIG = {
  firma_img: localStorage.getItem('cfg_firma_img') || ''
};

// ===== INIT =====
window.onload = ()=>{
  if(CONFIG.firma_img){
    document.getElementById('firmaImg').src = CONFIG.firma_img;
    document.getElementById('firmaPreview').style.display='block';
  }
};

// ===== CONFIG =====
function abrirConfig(){
  document.getElementById('config').classList.toggle('hidden');
  cargarLogs();
}

// ===== FIRMA =====
document.getElementById('firmaFile').addEventListener('change',function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(ev){
    CONFIG.firma_img = ev.target.result;
    document.getElementById('firmaImg').src = CONFIG.firma_img;
    document.getElementById('firmaPreview').style.display='block';
  };
  reader.readAsDataURL(file);
});

function guardarFirma(){
  localStorage.setItem('cfg_firma_img', CONFIG.firma_img);
  alert('Firma guardada correctamente');
}

// ===== LOGS =====
let LOGS = [];

function cargarLogs(){
  const saved = localStorage.getItem('logs');
  LOGS = saved ? JSON.parse(saved) : [];

  document.getElementById('logs').innerHTML = LOGS.map(l =>
    `<div style="border-bottom:1px solid #ccc;padding:5px">
      <b>${l.mensaje}</b><br>
      <small>${l.fecha}</small>
    </div>`
  ).join('');
}

function copiarLogs(){
  const txt = LOGS.map(l=>`${l.fecha} - ${l.mensaje}`).join('\n');
  navigator.clipboard.writeText(txt);
  alert('Logs copiados');
}

function descargarLogs(){
  const txt = LOGS.map(l=>`${l.fecha} - ${l.mensaje}`).join('\n');
  const blob = new Blob([txt],{type:'text/plain'});
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = 'logs.txt';
  a.click();
}

function limpiarLogs(){
  if(!confirm('¿Eliminar logs?')) return;

  LOGS = [];
  localStorage.removeItem('logs');
  cargarLogs();
}

// ===== ERROR GLOBAL =====
window.onerror = function(msg){
  guardarLog(msg);
};

function guardarLog(msg){
  const log = {
    mensaje: msg,
    fecha: new Date().toLocaleString()
  };

  LOGS.push(log);
  localStorage.setItem('logs', JSON.stringify(LOGS));
}
</script>

</body>
</html>
